name: Update brand header

on:
  push:
    paths:
      - .github/workflows/update-brand-header.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Helori header
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          # Replace the whole top brand bar so the left subtitle is 「此域」 and the right H.FUGUE block is removed.
          old_variants = [
              '<div class="brand-bar"><div class="brand-mark">H.FUGUE ATELIER</div><div>Keylume · Helori Origin Atlas</div></div>',
              '<div class="brand-bar"><div><div class="brand-mark">HANA SCENT ARTIST</div><div class="brand-sub">香徑嗅覺藝術</div></div><div>H.FUGUE ATELIER</div></div>',
              '<div class="brand-bar"><div><div class="brand-mark">HANA SCENT ARTIST</div><div>香徑嗅覺藝術</div></div><div>H.FUGUE ATELIER</div></div>',
          ]
          new = '<div class="brand-bar"><div><div class="brand-mark">HANA SCENT ARTIST</div><div style="font-family:\'Noto Serif TC\',\'PingFang TC\',serif;letter-spacing:.18em;text-transform:none;margin-top:6px;color:#555;font-size:14px;font-weight:400;">此域</div></div></div>'

          changed = False
          for old in old_variants:
              if old in text:
                  text = text.replace(old, new)
                  changed = True

          # Safety replacements for any leftover visible copy.
          if '香徑嗅覺藝術' in text:
              text = text.replace('香徑嗅覺藝術', '此域')
              changed = True
          if '<div>H.FUGUE ATELIER</div>' in text:
              text = text.replace('<div>H.FUGUE ATELIER</div>', '')
              changed = True

          if not changed:
              raise SystemExit('No matching header text found; index.html was not changed.')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update Helori brand header"
          git push
